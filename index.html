<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DOOMFALL SMP | DOOMFALL MEMBERS</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --vanta-black: #050505;
            --blood-red: #FF0000;
            --data-green: #00FF41;
            --glass-bg: rgba(10, 10, 10, 0.75);
            --glass-border: rgba(255, 0, 0, 0.25);
            --text-primary: #FFFFFF;
            --text-dim: #555555;
            --font-main: 'Montserrat', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--vanta-black);
            color: var(--text-primary);
            font-family: var(--font-main);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            perspective: 1000px;
        }

        /* Particle Background */
        #particle-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        /* Landing Screen */
        #landing {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: all 0.8s cubic-bezier(0.7, 0, 0.3, 1);
            z-index: 10;
            padding: 20px;
        }

        .neon-title {
            font-size: clamp(2.5rem, 12vw, 6rem);
            font-weight: 900;
            text-transform: uppercase;
            color: var(--text-primary);
            text-shadow: 0 0 20px var(--blood-red);
            letter-spacing: clamp(5px, 3vw, 20px);
            text-align: center;
            animation: flicker 3s infinite;
        }

        @keyframes flicker {
            0%, 18%, 22%, 25%, 53%, 57%, 100% { opacity: 1; }
            20%, 24%, 55% { opacity: 0.7; }
        }

        .init-btn {
            background: transparent;
            border: 1px solid var(--blood-red);
            color: var(--text-primary);
            padding: 15px 40px;
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: 3px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            margin-top: 40px;
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.2);
            position: relative;
        }

        .init-btn:hover, .init-btn:active {
            background: var(--blood-red);
            box-shadow: 0 0 30px var(--blood-red);
            transform: scale(1.05);
        }

        /* Top Bar */
        .top-nav {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 70px;
            padding: 0 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            z-index: 100;
            transform: translateY(-100%);
            transition: transform 0.6s cubic-bezier(0.7, 0, 0.3, 1);
        }

        body.active .top-nav {
            transform: translateY(0);
        }

        .nav-logo {
            font-weight: 900;
            letter-spacing: 2px;
            color: var(--blood-red);
            font-size: 0.9rem;
        }

        .back-btn {
            background: transparent;
            border: 1px solid var(--text-dim);
            color: var(--text-dim);
            padding: 6px 16px;
            font-size: 0.7rem;
            font-weight: 900;
            letter-spacing: 2px;
            cursor: pointer;
            text-transform: uppercase;
        }

        /* Dashboard */
        #dashboard {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            padding: 90px 20px 30px;
            overflow-y: auto;
            visibility: hidden;
            opacity: 0;
            transition: opacity 0.5s ease;
            -webkit-overflow-scrolling: touch;
        }

        body.active #landing {
            opacity: 0;
            transform: translateY(-50px) scale(0.95);
            visibility: hidden;
        }

        body.active #dashboard {
            visibility: visible;
            opacity: 1;
        }

        /* Grid System */
        .roster-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 15px;
            max-width: 1400px;
            margin: 0 auto;
        }

        @media (min-width: 600px) {
            .roster-grid {
                grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
                gap: 25px;
            }
        }

        /* 3D Card Animation */
        .slot-card {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            padding: 20px 15px;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: transform 0.3s ease, border-color 0.3s ease;
            transform-style: preserve-3d;
            opacity: 0;
            border-radius: 4px;
        }

        .slot-card.reveal {
            animation: flip3D 0.6s forwards cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        @keyframes flip3D {
            0% { transform: translateY(20px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }

        .slot-card.active-member {
            border-color: var(--data-green);
        }

        .slot-id {
            position: absolute;
            top: 10px;
            left: 10px;
            font-size: 0.6rem;
            color: var(--text-dim);
            font-weight: 700;
        }

        .avatar-circle {
            width: 80px;
            height: 80px;
            border-radius: 8px;
            border: 1.5px solid var(--text-dim);
            margin-bottom: 15px;
            overflow: hidden;
            background: #000;
        }

        @media (min-width: 600px) {
            .avatar-circle { width: 110px; height: 110px; }
        }

        .slot-card.active-member .avatar-circle {
            border-color: var(--data-green);
            box-shadow: 0 0 10px var(--data-green);
        }

        .avatar-circle img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card-name {
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
            text-align: center;
            word-break: break-all;
        }

        .card-status {
            font-size: 0.6rem;
            font-weight: 700;
            letter-spacing: 2px;
            color: var(--blood-red);
        }

        .status-active { color: var(--data-green); text-shadow: 0 0 5px var(--data-green); }

        .edit-trigger {
            margin-top: 15px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 6px 15px;
            font-size: 0.6rem;
            text-transform: uppercase;
            font-weight: 700;
            cursor: pointer;
            display: none; 
            width: 100%;
        }

        body.is-admin .edit-trigger { display: block; }

        /* Admin Unlock UI */
        #admin-lock {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 2000;
        }

        .lock-icon {
            width: 50px;
            height: 50px;
            background: rgba(10, 10, 10, 0.9);
            border: 1px solid var(--text-dim);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            color: var(--text-dim);
            font-size: 0.4rem;
            font-weight: 700;
            backdrop-filter: blur(10px);
        }

        /* Modals */
        #auth-modal, #hologram-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(15px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 5000;
            padding: 20px;
        }

        .auth-box, .hologram-box {
            background: #0a0a0a;
            border: 1px solid var(--blood-red);
            padding: 30px 20px;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .auth-input, .input-group input {
            width: 100%;
            padding: 12px;
            background: #000;
            border: 1px solid #333;
            color: white;
            margin: 15px 0;
            text-align: center;
            outline: none;
            font-family: var(--font-main);
        }

        .upload-area {
            width: 100%;
            height: 100px;
            border: 1px dashed #333;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-dim);
            font-size: 0.7rem;
            margin-bottom: 20px;
        }

        .action-btns {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .btn-action {
            padding: 12px;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            border: none;
            font-size: 0.7rem;
        }

        .btn-confirm { background: var(--blood-red); color: white; }
        .btn-cancel { background: #222; color: white; }

        .pulse-active {
            animation: pulseGreen 2s infinite;
        }

        @keyframes pulseGreen {
            0% { box-shadow: 0 0 0px var(--data-green); }
            50% { box-shadow: 0 0 10px var(--data-green); }
            100% { box-shadow: 0 0 0px var(--data-green); }
        }
    </style>
</head>
<body>

    <canvas id="particle-canvas"></canvas>

    <!-- Admin Verification -->
    <div id="auth-modal">
        <div class="auth-box">
            <h2 style="letter-spacing: 3px; font-size: 1.2rem; font-weight: 300;">ADMIN LOGIN</h2>
            <input type="password" id="passInput" class="auth-input" placeholder="PASSKEY">
            <div class="action-btns">
                <button class="btn-action btn-cancel" onclick="closeAuth()">EXIT</button>
                <button class="btn-action btn-confirm" onclick="verifyAdmin()">UNLOCK</button>
            </div>
        </div>
    </div>

    <!-- Edit Profile -->
    <div id="hologram-overlay">
        <div class="hologram-box">
            <h2 style="margin-bottom: 20px; letter-spacing: 3px; font-size: 1.1rem; font-weight: 300;">OVERRIDE SLOT</h2>
            <div class="input-group" style="text-align: left;">
                <label style="font-size: 0.6rem; color: var(--text-dim); text-transform: uppercase;">Operator Name</label>
                <input type="text" id="playerNameInput" placeholder="SYSTEM_ID">
            </div>
            <div class="input-group" style="text-align: left;">
                <label style="font-size: 0.6rem; color: var(--text-dim); text-transform: uppercase;">Image Uplink</label>
                <div class="upload-area" onclick="document.getElementById('fileInput').click()">
                    <span id="fileNameDisplay">TAP TO UPLOAD</span>
                    <input type="file" id="fileInput" hidden accept="image/*">
                </div>
            </div>
            <div class="action-btns">
                <button class="btn-action btn-cancel" onclick="closeHologram()">ABORT</button>
                <button class="btn-action btn-confirm" onclick="saveHologram()">SYNC</button>
            </div>
        </div>
    </div>

    <div id="admin-lock">
        <div class="lock-icon" id="lockIcon" onclick="openAuth()">SECURE</div>
    </div>

    <nav class="top-nav">
        <div class="nav-logo">DOOMFALL MEMBERS</div>
        <button class="back-btn" onclick="goBack()">BACK</button>
    </nav>

    <section id="landing">
        <h1 class="neon-title">DOOMFALL</h1>
        <button class="init-btn" onclick="initCommand()">VIEW MEMBERS</button>
    </section>

    <main id="dashboard">
        <div class="roster-grid" id="rosterGrid"></div>
    </main>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'doomfall-smp-v3';

        const ADMIN_PASS = "meisshubop";
        let isAdmin = false;
        let members = Array(25).fill(null).map(() => ({ name: "AWAITING", img: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23111'%3E%3Cpath d='M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z'/%3E%3C/svg%3E", active: false }));
        let currentIdx = null;

        async function initAuth() {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                await signInWithCustomToken(auth, __initial_auth_token);
            } else {
                await signInAnonymously(auth);
            }
        }

        onAuthStateChanged(auth, (user) => {
            if (user) {
                const rosterDocRef = doc(db, 'artifacts', appId, 'public', 'data', 'roster');
                onSnapshot(rosterDocRef, (docSnap) => {
                    if (docSnap.exists()) {
                        members = docSnap.data().list;
                        renderRoster(false);
                    } else {
                        setDoc(rosterDocRef, { list: members });
                    }
                }, (error) => console.error("Sync Error:", error));
            }
        });

        initAuth();

        // Particles
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function initParticles() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            particles = [];
            const count = window.innerWidth < 600 ? 40 : 80;
            for(let i=0; i<count; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 1.5,
                    speedX: (Math.random() - 0.5) * 0.4,
                    speedY: (Math.random() - 0.5) * 0.4,
                    opacity: Math.random() * 0.5
                });
            }
        }

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.x += p.speedX; p.y += p.speedY;
                if(p.x > canvas.width) p.x = 0; if(p.x < 0) p.x = canvas.width;
                if(p.y > canvas.height) p.y = 0; if(p.y < 0) p.y = canvas.height;
                ctx.fillStyle = `rgba(255, 0, 0, ${p.opacity})`;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill();
            });
            requestAnimationFrame(animateParticles);
        }

        window.initCommand = () => {
            document.body.classList.add('active');
            renderRoster(true);
        };

        window.goBack = () => document.body.classList.remove('active');

        window.openAuth = () => {
            if(isAdmin) {
                isAdmin = false;
                document.body.classList.remove('is-admin');
                document.getElementById('lockIcon').innerText = "SECURE";
                renderRoster(false);
                return;
            }
            document.getElementById('auth-modal').style.display = 'flex';
        };

        window.closeAuth = () => {
            document.getElementById('auth-modal').style.display = 'none';
            document.getElementById('passInput').value = '';
        };

        window.verifyAdmin = () => {
            if(document.getElementById('passInput').value === ADMIN_PASS) {
                isAdmin = true;
                document.body.classList.add('is-admin');
                document.getElementById('lockIcon').innerText = "ADMIN";
                window.closeAuth();
                renderRoster(false);
            } else {
                document.getElementById('passInput').style.borderColor = "red";
                setTimeout(() => document.getElementById('passInput').style.borderColor = "#333", 1000);
            }
        };

        window.openHologram = (idx) => {
            currentIdx = idx;
            document.getElementById('playerNameInput').value = members[idx].active ? members[idx].name : '';
            document.getElementById('fileNameDisplay').innerText = "TAP TO UPLOAD";
            document.getElementById('hologram-overlay').style.display = 'flex';
        };

        window.closeHologram = () => document.getElementById('hologram-overlay').style.display = 'none';

        window.saveHologram = async () => {
            if (!auth.currentUser) return;
            const name = document.getElementById('playerNameInput').value.trim();
            const file = document.getElementById('fileInput').files[0];
            
            let imgData = members[currentIdx].img;
            if (file) {
                imgData = await compressImage(file);
            }

            members[currentIdx] = {
                name: name || "AWAITING",
                img: imgData,
                active: !!name
            };

            const rosterDocRef = doc(db, 'artifacts', appId, 'public', 'data', 'roster');
            await setDoc(rosterDocRef, { list: members });
            window.closeHologram();
        };

        function renderRoster(stagger = false) {
            const grid = document.getElementById('rosterGrid');
            grid.innerHTML = '';
            members.forEach((m, i) => {
                const card = document.createElement('div');
                card.className = `slot-card ${m.active ? 'active-member pulse-active' : ''}`;
                card.innerHTML = `
                    <div class="slot-id">${i+1}</div>
                    <div class="avatar-circle"><img src="${m.img}" alt="u"></div>
                    <div class="card-name" style="color: ${m.active ? 'var(--data-green)' : 'var(--text-dim)'}">${m.name}</div>
                    <div class="card-status ${m.active ? 'status-active' : ''}">${m.active ? 'ACTIVE' : 'OFFLINE'}</div>
                    <button class="edit-trigger" onclick="openHologram(${i})">EDIT</button>
                `;
                
                // Mouse interactions (desktop only)
                if (window.innerWidth > 600) {
                    card.addEventListener('mousemove', (e) => {
                        const rect = card.getBoundingClientRect();
                        card.style.transform = `rotateY(${(e.clientX - rect.left - rect.width/2)/8}deg) rotateX(${-(e.clientY - rect.top - rect.height/2)/8}deg)`;
                    });
                    card.addEventListener('mouseleave', () => card.style.transform = `rotateY(0deg) rotateX(0deg)`);
                }

                grid.appendChild(card);
                if(stagger) card.style.animationDelay = `${i * 0.03}s`;
                card.classList.add('reveal');
            });
        }

        function compressImage(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (e) => {
                    const img = new Image();
                    img.src = e.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const size = 180;
                        canvas.width = size;
                        canvas.height = (img.height / img.width) * size;
                        canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                        resolve(canvas.toDataURL('image/jpeg', 0.6));
                    };
                };
            });
        }

        document.getElementById('fileInput').addEventListener('change', function() {
            if(this.files[0]) document.getElementById('fileNameDisplay').innerText = "IMG SELECTED";
        });

        window.onload = () => { initParticles(); animateParticles(); };
        window.onresize = initParticles;
    </script>
</body>
</html>
