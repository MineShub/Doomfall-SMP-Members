<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOOMFALL SMP | DOOMFALL MEMBERS</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --vanta-black: #050505;
            --blood-red: #FF0000;
            --data-green: #00FF41;
            --glass-bg: rgba(10, 10, 10, 0.75);
            --glass-border: rgba(255, 0, 0, 0.25);
            --text-primary: #FFFFFF;
            --text-dim: #555555;
            --font-main: 'Montserrat', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--vanta-black);
            color: var(--text-primary);
            font-family: var(--font-main);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            perspective: 1000px;
        }

        /* Particle Background */
        #particle-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        /* Landing Screen */
        #landing {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: all 0.8s cubic-bezier(0.7, 0, 0.3, 1);
            z-index: 10;
        }

        .neon-title {
            font-size: clamp(2rem, 10vw, 6rem);
            font-weight: 900;
            text-transform: uppercase;
            color: var(--text-primary);
            text-shadow: 0 0 30px var(--blood-red);
            letter-spacing: 20px;
            text-align: center;
            animation: flicker 3s infinite;
        }

        @keyframes flicker {
            0%, 18%, 22%, 25%, 53%, 57%, 100% { opacity: 1; }
            20%, 24%, 55% { opacity: 0.7; }
        }

        .init-btn {
            background: transparent;
            border: 1px solid var(--blood-red);
            color: var(--text-primary);
            padding: 20px 50px;
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: 5px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            margin-top: 50px;
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.2);
            position: relative;
            overflow: hidden;
        }

        .init-btn:hover {
            background: var(--blood-red);
            box-shadow: 0 0 50px var(--blood-red);
            transform: scale(1.1);
        }

        /* Top Bar */
        .top-nav {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 80px;
            padding: 0 50px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            z-index: 100;
            transform: translateY(-100%);
            transition: transform 0.6s cubic-bezier(0.7, 0, 0.3, 1);
        }

        body.active .top-nav {
            transform: translateY(0);
        }

        .back-btn {
            background: transparent;
            border: 1px solid var(--text-dim);
            color: var(--text-dim);
            padding: 8px 24px;
            font-size: 0.8rem;
            font-weight: 900;
            letter-spacing: 3px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }

        .back-btn:hover {
            border-color: var(--blood-red);
            color: var(--blood-red);
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.4);
            background: rgba(255, 0, 0, 0.05);
        }

        /* Admin Unlock UI */
        #admin-lock {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 2000;
        }

        .lock-icon {
            width: 60px;
            height: 60px;
            background: rgba(10, 10, 10, 0.8);
            border: 1px solid var(--text-dim);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            color: var(--text-dim);
            font-size: 0.5rem;
            font-weight: 700;
            letter-spacing: 1px;
            transition: 0.3s;
            backdrop-filter: blur(10px);
        }

        .lock-icon:hover { border-color: var(--blood-red); color: var(--blood-red); }
        .lock-icon.unlocked { border-color: var(--data-green); color: var(--data-green); box-shadow: 0 0 15px var(--data-green); }

        /* Dashboard */
        #dashboard {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            padding: 120px 50px 50px;
            overflow-y: auto;
            visibility: hidden;
            opacity: 0;
            transition: opacity 1s ease;
        }

        body.active #landing {
            opacity: 0;
            transform: translateY(-100px) scale(0.9);
            visibility: hidden;
        }

        body.active #dashboard {
            visibility: visible;
            opacity: 1;
        }

        /* Grid System */
        .roster-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
            max-width: 1800px;
            margin: 0 auto;
        }

        /* 3D Card Animation */
        @keyframes flip3D {
            0% { transform: rotateY(90deg) scale(0.8); opacity: 0; }
            100% { transform: rotateY(0deg) scale(1); opacity: 1; }
        }

        .slot-card {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            padding: 30px;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: transform 0.1s ease, border-color 0.5s ease, box-shadow 0.5s ease;
            transform-style: preserve-3d;
            opacity: 0;
        }

        .slot-card.reveal {
            animation: flip3D 0.8s forwards cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .slot-card.active-member {
            border-color: var(--data-green);
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.1);
        }

        .slot-card:hover {
            border-color: white;
            z-index: 5;
        }

        .slot-id {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 0.8rem;
            color: var(--text-dim);
            font-weight: 700;
            transform: translateZ(20px);
        }

        .avatar-circle {
            width: 120px;
            height: 120px;
            border-radius: 10px;
            border: 2px solid var(--text-dim);
            margin-bottom: 25px;
            overflow: hidden;
            background: #000;
            transform: translateZ(40px);
            transition: all 0.5s ease;
        }

        .slot-card.active-member .avatar-circle {
            border-color: var(--data-green);
            box-shadow: 0 0 15px var(--data-green);
        }

        .avatar-circle img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card-name {
            font-size: 1.1rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
            transform: translateZ(30px);
        }

        .card-status {
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 3px;
            color: var(--blood-red);
            text-transform: uppercase;
            transform: translateZ(25px);
        }

        .status-active { color: var(--data-green); text-shadow: 0 0 10px var(--data-green); }

        /* Hidden by Default - Only shows for Admin */
        .edit-trigger {
            margin-top: 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 8px 25px;
            font-size: 0.7rem;
            text-transform: uppercase;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            transform: translateZ(50px);
            display: none; 
        }

        body.is-admin .edit-trigger { display: block; }
        .edit-trigger:hover { background: white; color: black; }

        /* Auth Modal */
        #auth-modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(20px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 5000;
        }

        .auth-box {
            background: #0a0a0a;
            border: 1px solid var(--blood-red);
            padding: 40px;
            width: 350px;
            text-align: center;
        }

        .auth-input {
            width: 100%;
            padding: 12px;
            background: #000;
            border: 1px solid #333;
            color: white;
            margin: 20px 0;
            text-align: center;
            outline: none;
        }

        /* Holographic Overlay Panel */
        #hologram-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(20px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        #hologram-overlay.open {
            display: flex;
            opacity: 1;
        }

        .hologram-box {
            width: 500px;
            padding: 50px;
            background: rgba(20, 20, 20, 0.8);
            border: 1px solid var(--blood-red);
            box-shadow: 0 0 50px rgba(255, 0, 0, 0.2);
            position: relative;
            transform: scale(0.8);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #hologram-overlay.open .hologram-box {
            transform: scale(1);
        }

        .input-group {
            margin-bottom: 30px;
        }

        .input-group label {
            display: block;
            font-size: 0.7rem;
            color: var(--text-dim);
            text-transform: uppercase;
            margin-bottom: 15px;
            letter-spacing: 2px;
        }

        .input-group input[type="text"] {
            width: 100%;
            background: #000;
            border: 1px solid #333;
            padding: 15px;
            color: white;
            font-family: var(--font-main);
            outline: none;
            transition: 0.3s;
        }

        .input-group input[type="text"]:focus {
            border-color: var(--blood-red);
        }

        .upload-area {
            width: 100%;
            height: 150px;
            border: 1px dashed #333;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: var(--text-dim);
            cursor: pointer;
            transition: 0.3s;
        }

        .upload-area:hover {
            border-color: var(--blood-red);
            color: white;
        }

        .action-btns {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 40px;
        }

        .btn-action {
            padding: 15px;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            border: none;
            transition: 0.3s;
        }

        .btn-confirm { background: var(--blood-red); color: white; }
        .btn-confirm:hover { box-shadow: 0 0 20px var(--blood-red); }
        .btn-cancel { background: #333; color: white; }

        /* Pulse for active states */
        @keyframes pulseGreen {
            0% { box-shadow: 0 0 0px var(--data-green); }
            50% { box-shadow: 0 0 20px var(--data-green); }
            100% { box-shadow: 0 0 0px var(--data-green); }
        }

        .pulse-active {
            animation: pulseGreen 2s infinite;
        }

        #dashboard::-webkit-scrollbar { width: 4px; }
        #dashboard::-webkit-scrollbar-thumb { background: var(--blood-red); }

        .loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: black; color: var(--blood-red);
            display: flex; justify-content: center; align-items: center;
            z-index: 9999; font-weight: 900; letter-spacing: 5px;
        }

        @media (max-width: 768px) {
            .hologram-box { width: 90%; padding: 30px; }
            .top-nav { padding: 0 20px; }
        }
    </style>
</head>
<body>

    <div id="loading" class="loading-overlay">INITIALIZING CLOUD UPLINK...</div>

    <canvas id="particle-canvas"></canvas>

    <!-- Admin Verification -->
    <div id="auth-modal">
        <div class="auth-box">
            <h2 style="letter-spacing: 5px; font-weight: 300;">ADMIN LOGIN</h2>
            <input type="password" id="passInput" class="auth-input" placeholder="PASSKEY">
            <div class="action-btns" style="margin-top: 10px;">
                <button class="btn-action btn-cancel" onclick="closeAuth()">EXIT</button>
                <button class="btn-action btn-confirm" onclick="verifyAdmin()">UNLOCK</button>
            </div>
        </div>
    </div>

    <!-- Edit Profile -->
    <div id="hologram-overlay">
        <div class="hologram-box">
            <h2 style="margin-bottom: 30px; letter-spacing: 5px; font-weight: 300;">OVERRIDE SLOT</h2>
            <div class="input-group">
                <label>Operator Designation</label>
                <input type="text" id="playerNameInput" placeholder="SYSTEM_ID_NULL">
            </div>
            <div class="input-group">
                <label>Visual Identity Uplink</label>
                <div class="upload-area" onclick="document.getElementById('fileInput').click()">
                    <span id="fileNameDisplay">SECURE UPLOAD PORT</span>
                    <input type="file" id="fileInput" hidden accept="image/*">
                </div>
            </div>
            <div class="action-btns">
                <button class="btn-cancel" onclick="closeHologram()">ABORT</button>
                <button class="btn-confirm" id="saveBtn" onclick="saveHologram()">SYNCHRONIZE</button>
            </div>
        </div>
    </div>

    <div id="admin-lock">
        <div class="lock-icon" id="lockIcon" onclick="openAuth()">SECURE</div>
    </div>

    <nav class="top-nav">
        <div style="font-weight: 900; letter-spacing: 5px; color: var(--blood-red);">DOOMFALL MEMBERS</div>
        <button class="back-btn" onclick="goBack()">BACK</button>
    </nav>

    <section id="landing">
        <h1 class="neon-title">DOOMFALL</h1>
        <button class="init-btn" onclick="initCommand()">VIEW MEMBERS</button>
    </section>

    <main id="dashboard">
        <div class="roster-grid" id="rosterGrid"></div>
    </main>

    <!-- Firebase SDKs Integration -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Global Variable Initialization
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'doomfall-roster-prod';

        // Admin Config
        const ADMIN_PASS = "meisshubop";
        let isAdmin = false;
        let members = [];
        let currentIdx = null;
        const DEFAULT_IMG = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23111'%3E%3Cpath d='M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z'/%3E%3C/svg%3E";

        // --- AUTH & SYNC LOGIC ---
        const initAuth = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (err) { console.error("Auth Fail", err); }
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('loading').style.display = 'none';
                listenToRoster();
            }
        });

        function listenToRoster() {
            // RULE 1: Specific path usage
            const rosterRef = doc(db, 'artifacts', appId, 'public', 'data', 'roster_v3');
            
            onSnapshot(rosterRef, (snapshot) => {
                if (snapshot.exists()) {
                    members = snapshot.data().list;
                    renderRoster(false);
                } else {
                    // Pre-fill with empty slots if first time
                    members = Array(25).fill(null).map(() => ({ name: "AWAITING", img: DEFAULT_IMG, active: false }));
                    setDoc(rosterRef, { list: members });
                }
            }, (error) => {
                console.error("Firestore Error:", error);
            });
        }

        // --- UI FUNCTIONS ---
        window.initCommand = () => {
            document.body.classList.add('active');
            renderRoster(true);
        };

        window.goBack = () => {
            document.body.classList.remove('active');
        };

        window.openAuth = () => {
            if(isAdmin) {
                isAdmin = false;
                document.body.classList.remove('is-admin');
                document.getElementById('lockIcon').innerText = "SECURE";
                document.getElementById('lockIcon').classList.remove('unlocked');
                renderRoster(false);
                return;
            }
            document.getElementById('auth-modal').style.display = 'flex';
        };

        window.closeAuth = () => {
            document.getElementById('auth-modal').style.display = 'none';
            document.getElementById('passInput').value = '';
        };

        window.verifyAdmin = () => {
            const pass = document.getElementById('passInput').value;
            if(pass === ADMIN_PASS) {
                isAdmin = true;
                document.body.classList.add('is-admin');
                document.getElementById('lockIcon').innerText = "ADMIN";
                document.getElementById('lockIcon').classList.add('unlocked');
                closeAuth();
                renderRoster(false);
            } else {
                document.getElementById('passInput').style.borderColor = "red";
                setTimeout(() => document.getElementById('passInput').style.borderColor = "#333", 1000);
            }
        };

        function renderRoster(stagger = false) {
            const grid = document.getElementById('rosterGrid');
            grid.innerHTML = '';
            members.forEach((m, i) => {
                const card = document.createElement('div');
                card.className = `slot-card ${m.active ? 'active-member pulse-active' : ''} reveal`;
                if(stagger) card.style.animationDelay = `${i * 0.05}s`;
                
                card.innerHTML = `
                    <div class="slot-id">${String(i+1).padStart(2, '0')}</div>
                    <div class="avatar-circle">
                        <img src="${m.img}" alt="u">
                    </div>
                    <div class="card-name" style="color: ${m.active ? 'var(--data-green)' : 'var(--text-dim)'}">${m.name}</div>
                    <div class="card-status ${m.active ? 'status-active' : ''}">${m.active ? 'ACTIVE' : 'OFFLINE'}</div>
                    <button class="edit-trigger" onclick="openHologram(${i})">MOD_ID</button>
                `;
                
                // 3D Tilt Effect logic
                card.onmousemove = (e) => {
                    const rect = card.getBoundingClientRect();
                    const dx = e.clientX - (rect.left + rect.width/2);
                    const dy = e.clientY - (rect.top + rect.height/2);
                    card.style.transform = `rotateY(${dx/15}deg) rotateX(${-dy/15}deg)`;
                };
                card.onmouseleave = () => card.style.transform = `rotateY(0deg) rotateX(0deg)`;

                grid.appendChild(card);
            });
        }

        window.openHologram = (idx) => {
            currentIdx = idx;
            document.getElementById('playerNameInput').value = members[idx].active ? members[idx].name : '';
            document.getElementById('fileNameDisplay').innerText = "SECURE UPLOAD PORT";
            document.getElementById('hologram-overlay').classList.add('open');
        };

        window.closeHologram = () => {
            document.getElementById('hologram-overlay').classList.remove('open');
        };

        window.saveHologram = async () => {
            const saveBtn = document.getElementById('saveBtn');
            saveBtn.innerText = "UPLOADING...";
            saveBtn.disabled = true;

            const name = document.getElementById('playerNameInput').value.trim();
            const fileInput = document.getElementById('fileInput');
            let imgData = members[currentIdx].img;

            if (fileInput.files[0]) {
                imgData = await compressImage(fileInput.files[0]);
            }

            // Local update for immediate feedback
            members[currentIdx] = {
                name: name || "AWAITING",
                img: imgData,
                active: !!name
            };

            // Cloud update
            const rosterRef = doc(db, 'artifacts', appId, 'public', 'data', 'roster_v3');
            try {
                await setDoc(rosterRef, { list: members });
            } catch (err) {
                console.error("Save Error", err);
            }

            saveBtn.innerText = "SYNCHRONIZE";
            saveBtn.disabled = false;
            closeHologram();
        };

        function compressImage(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (e) => {
                    const img = new Image();
                    img.src = e.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const MAX = 180;
                        let w = img.width, h = img.height;
                        if (w > h) { if (w > MAX) { h *= MAX/w; w = MAX; } }
                        else { if (h > MAX) { w *= MAX/h; h = MAX; } }
                        canvas.width = w; canvas.height = h;
                        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                        resolve(canvas.toDataURL('image/jpeg', 0.6));
                    };
                };
            });
        }

        // --- PARTICLE BG ---
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        let pts = [];
        function initP() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            pts = Array(60).fill().map(() => ({
                x: Math.random()*canvas.width, y: Math.random()*canvas.height,
                s: Math.random()*2, vx: (Math.random()-0.5)*0.5, vy: (Math.random()-0.5)*0.5, o: Math.random()
            }));
        }
        function anim() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            pts.forEach(p => {
                p.x+=p.vx; p.y+=p.vy;
                if(p.x<0||p.x>canvas.width) p.vx*=-1;
                if(p.y<0||p.y>canvas.height) p.vy*=-1;
                ctx.fillStyle = `rgba(255,0,0,${p.o})`;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.s, 0, Math.PI*2); ctx.fill();
            });
            requestAnimationFrame(anim);
        }

        // Initialize Everything
        initAuth();
        initP();
        anim();
        window.onresize = initP;
        document.getElementById('fileInput').addEventListener('change', function() {
            if(this.files[0]) document.getElementById('fileNameDisplay').innerText = "LINK_READY";
        });
    </script>
</body>
</html>
